modules:
  jira:globalPage:
    - key: jira-migration-audit-page
      resource: main
      resolver:
        function: resolver
      title: Jira Migration Audit
      layout: basic

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/hello-world/build

app:
  id: ari:cloud:ecosystem::app/jira-migration-audit
  name: Jira Migration Audit

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
